databases:
  - name: rituals-db
    plan: free

services:
  - type: web
    name: rituals-backend
    env: docker
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: rituals-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: rituals-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: rituals-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: rituals-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: rituals-db
          property: password
